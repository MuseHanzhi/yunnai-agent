required_env:
    - OSS_ACCESS_KEY_ID
    - OSS_ACCESS_KEY_SECRET
oss:
    region: "cn-beijing"
    bucket: "yunnai-agent-oss"
agent:
    word_delay: 0.1
    prompt_path:
        chat: "./prompts/chat.md"
listen:
    - 
        nickname: "慕色寒枝"
        event_type: "friend"
        msg_types:
            - "text"
            - "image"
            - "system"
    -
        nickname: "相亲相爱一家人"
        metadata:
            type: "group"
            main_user: "慕色寒枝"
        event_type: "friend"
        msg_types: 
            - "text"
            - "voice"
            - "quote"
    